[pytest]
# Top-level pytest config for the monorepo.
# Used by both backend-ci.yml and local pytest invocations.

# pytest-asyncio: explicit per-test marking (use @pytest.mark.asyncio).
# Strict mode prevents accidentally async-coloring sync tests.
asyncio_mode = strict

# Skip directories that aren't tests.
norecursedirs =
    .git
    .next
    node_modules
    .venv
    venv
    coverage
    test-results
    playwright-report
    WEB_TESTING
    _archived

# backend/test_app.py is NOT a pytest test file — it's a standalone
# FastAPI ECS smoke-test backend that pytest collects because of the
# test_ prefix. Ignored here so the Dockerfile.test entrypoint can keep
# its name.
addopts = --ignore=backend/test_app.py

# Quiet some noisy markers from old test files
filterwarnings =
    ignore::DeprecationWarning:pkg_resources
