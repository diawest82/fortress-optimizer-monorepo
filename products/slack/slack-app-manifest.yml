display_information:
  name: Fortress Token Optimizer
  description: Optimize prompts, reduce token usage, and track savings in Slack.
  background_color: "#111827"
features:
  bot_user:
    display_name: Fortress Optimizer
    always_online: true
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - chat:write
      - chat:write.public
      - commands
      - im:history
      - channels:history
      - groups:history
      - mpim:history
settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.im
      - message.channels
      - message.groups
      - message.mpim
  interactivity:
    is_enabled: false
  socket_mode_enabled: true
  org_deploy_enabled: false
  token_rotation_enabled: false
