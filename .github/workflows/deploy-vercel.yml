name: Deploy to Vercel Production

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  WORKING_DIRECTORY: website

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'website/package-lock.json'
      
      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm ci

      - name: Run tests
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm test -- --ci --passWithNoTests

      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      
      - name: Pull Vercel environment
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt to Vercel
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
      
      - name: Install Playwright browsers
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests against production
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npx playwright test --project=smoke --retries=1
        env:
          TEST_BASE_URL: https://www.fortress-optimizer.com

      - name: Run destination crawler
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npx playwright test --project=qa-destination-crawler --retries=1
        env:
          TEST_BASE_URL: https://www.fortress-optimizer.com

      - name: Run critical security tests
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npx playwright test --project=qa-session --project=qa-fuzz --retries=1
        env:
          TEST_BASE_URL: https://www.fortress-optimizer.com

      - name: Run billing verification
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npx playwright test --project=qa-stripe-live --retries=1
        env:
          TEST_BASE_URL: https://www.fortress-optimizer.com

      - name: Run optimization accuracy
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npx playwright test --project=qa-optimization-accuracy --retries=1
        env:
          TEST_BASE_URL: https://www.fortress-optimizer.com
          TEST_API_URL: https://api.fortress-optimizer.com

      - name: Run auth flow verification
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npx playwright test --project=qa-rbac --retries=1
        env:
          TEST_BASE_URL: https://www.fortress-optimizer.com

      - name: Test deployment
        run: |
          echo "✓ Website deployed and all critical tests passed"
          echo "Check https://fortress-optimizer.com"
      
      - name: Notify success
        if: success()
        run: echo "✅ Deployment to Vercel completed successfully!"
