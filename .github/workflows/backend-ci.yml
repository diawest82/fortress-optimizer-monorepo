name: Backend CI

# Path filter design intent (audited 2026-04-08):
#
# Triggers on changes that could affect the FastAPI backend or its tests:
#   - backend/**           — the FastAPI app itself
#   - shared-libs/**       — Python libs the backend imports
#   - tests/**             — pytest test files
#   - .github/workflows/backend-ci.yml — so workflow edits re-trigger
#
# Does NOT trigger on website/** changes. Reasoning:
#   - All tests in tests/ use TestClient(app) against the in-process
#     FastAPI app. They have zero dependency on website code.
#   - A website PR cannot break a backend test by definition.
#
# Cross-validation gap (KNOWN, not yet fixed): after a backend DEPLOY
# changes the API contract, no workflow re-validates the website against
# the new backend. Goal would be a backend-deploy post-hook that triggers
# a website integration smoke run. Not done yet — see follow-up todo.

on:
  pull_request:
    paths:
      - "backend/**"
      - "shared-libs/**"
      - "tests/**"
      - "backend/requirements.txt"
      - ".github/workflows/backend-ci.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "shared-libs/**"
      - "tests/**"
      - ".github/workflows/backend-ci.yml"
  # Allow manual runs from the Actions tab — useful for verifying the
  # --ignore list after edits to this workflow itself.
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite:///./test_ci.db"
      API_KEY_SECRET: "ci-test-secret-key"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest-cov

      - name: Create shared-libs symlink
        run: ln -sf shared-libs shared_libs

      - name: Run tests with coverage
        # Fixed 2026-04-09: 13 of 14 previously-ignored files now pass.
        # Remaining ignores:
        #   backend/test_app.py — not a test file (ECS smoke-test backend)
        #   tests/test_load.py  — async tests hang under pytest-asyncio;
        #     needs investigation before re-enabling.
        run: |
          python -m pytest tests/ backend/ \
            --ignore=backend/test_app.py \
            --ignore=tests/test_load.py \
            --cov=backend \
            --cov-report=term-missing \
            -v --tb=short
