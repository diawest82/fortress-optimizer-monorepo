name: Backend Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "shared-libs/**"
      - "Dockerfile"
      - "buildspec.yml"
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPO: 673895432464.dkr.ecr.us-east-1.amazonaws.com/fortress-optimizer-backend
  ECS_CLUSTER: fortress-optimizer-cluster
  ECS_SERVICE: fortress-backend-service

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite:///./test_ci.db"
      API_KEY_SECRET: "ci-test-secret-key"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest-cov

      - name: Create shared-libs symlink
        run: ln -sf shared-libs shared_libs

      - name: Run tests
        run: |
          python -m pytest tests/ backend/ \
            --cov=backend \
            --cov-fail-under=80 \
            -v --tb=short

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Run database migrations
        run: |
          cd backend && pip install -r requirements.txt && \
          alembic upgrade head || echo "⚠️ Migration failed or no pending migrations"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build and push Docker image
        run: |
          docker build --no-cache -f backend/Dockerfile -t ${{ env.ECR_REPO }}:production .
          docker push ${{ env.ECR_REPO }}:production

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for deployment
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }}
          echo "Deployment complete"
